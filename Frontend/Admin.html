<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SuperAI Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      padding: 20px;
      background-color: #e94e77;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    header img {
      height: 40px;
      margin-right: 10px;
    }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #users {
      width: 200px;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      background-color: #f0f0f0;
    }
    #users div {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
    }
    #users div:hover {
      background-color: #ddd;
    }
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      overflow-y: auto;
      background-color: #f5f5f5;
    }
    .message {
      margin-bottom: 15px;
    }
    .message.user { text-align: left; }
    .message.ai { text-align: left; color: #555; }
    .message.admin { text-align: right; color: #e94e77; }
    #input-area {
      display: flex;
      padding: 10px;
      background-color: #eee;
    }
    #input-area input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    #input-area button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 10px;
      background-color: #e94e77;
      color: white;
      border: none;
      cursor: pointer;
    }
    #buttons {
      margin-left: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
  </style>
</head>
<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712277.png" alt="Logo">
  SuperAI Admin
</header>

<div id="main">
  <div id="users">Chargement des utilisateurs...</div>
  <div id="chat">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="reply-text" placeholder="Écris ta réponse ici...">
      <div id="buttons">
        <button onclick="sendReply()">Répondre</button>
        <button onclick="aiReply()">IA répond</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://superai-project-9tgb.onrender.com";
let selectedUser = null;

// Charger tous les utilisateurs
async function loadUsers() {
  const res = await fetch(API + "/users");
  const users = await res.json();
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";
  users.forEach(u => {
    const div = document.createElement("div");
    div.textContent = u.id;
    div.onclick = () => selectUser(u.id);
    usersDiv.appendChild(div);
  });
}

// Sélectionner un utilisateur et charger ses messages
async function selectUser(userId) {
  selectedUser = userId;
  const res = await fetch(API + "/messages/" + userId);
  const msgs = await res.json();
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";
  msgs.forEach(m => addMessage(messagesDiv, m.text, m.from));
}

// Ajouter un message dans la vue
function addMessage(container, text, from) {
  const div = document.createElement("div");
  div.className = "message " + from;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Répondre manuellement
async function sendReply() {
  const text = document.getElementById("reply-text").value.trim();
  if (!text || !selectedUser) return;
  document.getElementById("reply-text").value = "";
  await fetch(API + "/reply", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({user: selectedUser, text})
  });
  addMessage(document.getElementById("messages"), text, "admin");
}

// Faire répondre l’IA
async function aiReply() {
  if (!selectedUser) return;
  const res = await fetch(API + "/ai-reply", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({user: selectedUser})
  });
  const data = await res.json();
  if(data.ok) {
    // Recharger les messages
    selectUser(selectedUser);
  } else {
    alert("Erreur IA");
  }
}

// Initialisation
loadUsers();
</script>

</body>
</html>
