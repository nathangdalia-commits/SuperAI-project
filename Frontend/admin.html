<!DOCTYPE html>
<html>
<head>
<title>SuperAI Admin</title>
<style>
body{font-family:sans-serif;text-align:center;}
#users,#chat{border:1px solid #ccc;height:300px;overflow:auto;padding:10px;margin:10px;}
input{width:60%;padding:10px;}
button{padding:10px 20px;margin:5px;}
</style>
</head>
<body>
<h1>SuperAI — Admin Panel</h1>
<div id="users"></div>
<div id="chat"></div>
<input id="rep" placeholder="Réponse">
<button onclick="human()">Répondre</button>
<button onclick="ai()">IA répondre</button>

<script>
const API="https://ton-backend-render.onrender.com";
let current=null;

async function load(){
  const r=await fetch(API+'/users');
  const u=await r.json();
  users.innerHTML='';
  u.forEach(x=>{
    const d=document.createElement('div');
    d.innerText=x.id;
    d.onclick=()=>sel(x.id);
    users.appendChild(d);
  });
}

async function sel(id){
  current=id;
  const r=await fetch(API+'/messages/'+id);
  const m=await r.json();
  chat.innerHTML='';
  m.forEach(x=>{
    const p=document.createElement('p');
    p.innerText=x.from+" : "+x.text;
    chat.appendChild(p);
  });
}

async function human(){
  await fetch(API+'/reply',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:current,text:rep.value})
  });
}

async function ai(){
  await fetch(API+'/ai-reply',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:current})
  });
}

setInterval(load,2000);
</script>
</body>
</html>
