<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SuperAI - Utilisateur</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #4a90e2, #50e3c2);
    color: #fff;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    padding: 20px;
    background-color: rgba(0,0,0,0.2);
  }
  header img {
    height: 50px;
    margin-right: 15px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background-color: rgba(0,0,0,0.1);
    border-radius: 10px;
    margin: 10px;
  }
  .message {
    margin-bottom: 15px;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 80%;
    word-wrap: break-word;
  }
  .message.user {
    background-color: #2d9cdb;
    margin-left: auto;
    text-align: right;
  }
  .message.ai {
    background-color: #27ae60;
    margin-right: auto;
    text-align: left;
  }

  #input-area {
    display: flex;
    padding: 10px;
    background-color: rgba(0,0,0,0.2);
  }
  #input-area input {
    flex: 1;
    padding: 15px;
    font-size: 18px;
    border-radius: 25px;
    border: none;
    outline: none;
  }
  #input-area button {
    padding: 15px 20px;
    font-size: 18px;
    margin-left: 10px;
    border: none;
    border-radius: 25px;
    background-color: #e94e77;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712277.png" alt="Logo">
  SuperAI
</header>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="message" placeholder="Écris ta question ici...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
const API = "https://superai-project-9tgb.onrender.com"; // ton backend Render
const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");

function addMessage(text, from) {
  const div = document.createElement("div");
  div.className = "message " + from;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  addMessage(text, "user");
  messageInput.value = "";

  // Envoi au backend
  await fetch(API + "/message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({userId: "user1", message: text})
  });
}
</script>

</body>
</html>
