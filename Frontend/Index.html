<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SuperAI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }
    header {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      padding: 20px;
      background-color: #4a90e2;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    header img {
      height: 40px;
      margin-right: 10px;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .message {
      margin-bottom: 15px;
    }
    .message.user {
      text-align: right;
    }
    .message.ai {
      text-align: left;
    }
    #input-area {
      display: flex;
      padding: 10px;
      background-color: #eee;
    }
    #input-area input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    #input-area button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 10px;
      background-color: #4a90e2;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712277.png" alt="Logo">
  SuperAI
</header>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="message" placeholder="Écris ta question ici...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
  const API = "https://superai-project-9tgb.onrender.com";

  const chat = document.getElementById("chat");
  const messageInput = document.getElementById("message");

  function addMessage(text, from) {
    const div = document.createElement("div");
    div.className = "message " + from;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    messageInput.value = "";

    try {
      await fetch(API + "/message", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({userId: "user1", message: text})
      });
    } catch (err) {
      addMessage("Erreur : impossible d’envoyer le message.", "ai");
    }
  }
</script>

</body>
</html>
